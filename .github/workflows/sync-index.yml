name: Sync index.json

on:
  push:
    branches: [main]
    paths:
      - '**/meta.json'
      - '**/*.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.json
        run: |
          echo '{"templates":[' > index.json
          first=true
          for dir in */; do
            if [ -f "${dir}meta.json" ]; then
              template_name="${dir%/}"

              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> index.json
              fi

              # Read meta.json and add files array
              meta=$(cat "${dir}meta.json")

              # Find all files in the template directory (exclude meta.json)
              files_json=$(find "$dir" -type f ! -name "meta.json" | sed "s|^${dir}||" | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')

              # Merge meta with files array
              echo "$meta" | jq --argjson files "$files_json" '. + {files: $files}' >> index.json
            fi
          done
          echo ']}' >> index.json
          # Pretty print
          cat index.json | jq '.' > index.tmp && mv index.tmp index.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync index.json from meta.json files"
            git push
          fi
