name: Validate Registry

on:
  push:
    branches: [main]
    paths:
      - 'prompts/**'
      - 'templates/**'
  pull_request:
    branches: [main]
    paths:
      - 'prompts/**'
      - 'templates/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate prompt hashes
        run: |
          cd prompts
          errors=0
          for f in *.md; do
            if [ "$f" = "*.md" ]; then
              continue
            fi
            expected_hash="${f%.md}"
            actual_hash=$(shasum -a 256 "$f" | cut -d' ' -f1)
            if [ "$expected_hash" != "$actual_hash" ]; then
              echo "ERROR: Hash mismatch for $f"
              echo "  Expected: $expected_hash"
              echo "  Actual:   $actual_hash"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors hash mismatches"
            exit 1
          fi
          echo "All prompt hashes verified"

      - name: Validate index files
        run: |
          # Check prompts/index.json exists and is valid JSON
          if [ ! -f prompts/index.json ]; then
            echo "ERROR: prompts/index.json not found"
            exit 1
          fi
          cat prompts/index.json | jq . > /dev/null || exit 1
          echo "prompts/index.json is valid"

          # Check templates/index.json exists and is valid JSON
          if [ ! -f templates/index.json ]; then
            echo "ERROR: templates/index.json not found"
            exit 1
          fi
          cat templates/index.json | jq . > /dev/null || exit 1
          echo "templates/index.json is valid"

          # Verify all prompt hashes in index exist as files
          for hash in $(cat prompts/index.json | jq -r '.prompts[].hash'); do
            if [ ! -f "prompts/${hash}.md" ]; then
              echo "ERROR: Missing prompt file for hash: $hash"
              exit 1
            fi
          done
          echo "All indexed prompts have corresponding files"
